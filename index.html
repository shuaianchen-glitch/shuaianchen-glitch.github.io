<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ShuaiAn Chen — Cognitive Field Interface">
  <meta name="theme-color" content="#050608">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>陈帅安 · Cognitive Field</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes.css?v=20250622-v22">
  <link rel="stylesheet" href="css/field.css?v=20250622-v22">
</head>
<body>
  <canvas id="field-canvas" aria-label="Cognitive field — spatial interface"></canvas>

  <div class="field-ui" aria-live="polite">
    <header class="field-chrome field-chrome--top">
      <span class="field-system-label" id="field-label">Cognitive Field Interface</span>
      <a class="field-link" href="https://github.com/shuaianchen-glitch" target="_blank" rel="noopener">GitHub</a>
    </header>

    <div class="field-core" id="field-core">
      <p class="field-name-en" id="field-name-en">ShuaiAn Chen</p>
      <h1 class="field-name" id="field-name">陈帅安</h1>
      <p class="field-role" id="field-role">Frontend · Interaction · Generative Systems</p>
      <p class="field-philosophy" id="field-philosophy">重复不是惩罚，是雕刻。</p>
    </div>

    <div class="field-labels" id="field-labels" aria-hidden="true"></div>

    <aside class="field-meta" id="field-meta" hidden>
      <p class="field-meta-kicker" id="meta-type">node</p>
      <h2 class="field-meta-title" id="meta-title"></h2>
      <p class="field-meta-body" id="meta-body"></p>
      <div class="field-meta-tags" id="meta-tags"></div>
      <dl class="field-meta-metrics">
        <div><dt>Weight</dt><dd id="meta-weight">—</dd></div>
        <div><dt>Relevance</dt><dd id="meta-relevance">—</dd></div>
      </dl>
    </aside>

    <aside class="field-sub" id="field-sub" hidden>
      <div class="field-sub-backdrop" id="field-backdrop"></div>
      <article class="field-sub-panel" role="dialog" aria-modal="true">
        <button type="button" class="field-sub-close" id="field-close" aria-label="Return to field">← Field</button>
        <p class="field-sub-kicker" id="sub-type">project</p>
        <h2 class="field-sub-title" id="sub-title"></h2>
        <p class="field-sub-body" id="sub-body"></p>
        <div class="field-sub-tags" id="sub-tags"></div>
        <button type="button" class="field-sub-cta" id="sub-cta" hidden>Open project →</button>
      </article>
    </aside>

    <footer class="field-chrome field-chrome--bottom">
      <span id="field-hint-probe">Move · probe the field</span>
      <span class="field-chrome-sep">·</span>
      <span id="field-hint-scroll">Scroll · traverse depth</span>
      <span class="field-chrome-sep">·</span>
      <span>© <span id="year"></span> ShuaiAn Chen</span>
    </footer>
  </div>

  <script defer src="js/vendor/three.min.js?v=20250622-v22"></script>
  <script defer src="content/site.js?v=20250622-v22"></script>
  <script defer src="js/cognitive-field.js?v=20250622-v22"></script>
  <script defer src="js/main.js?v=20250622-v22"></script>
</body>
</html>
